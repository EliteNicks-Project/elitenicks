<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nombres de Clanes | EliteNicks</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd700; --secondary: #feb47b; --dark: #0f172a; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; line-height: 1.6; }
        header { padding: 2rem 1rem; text-align: center; background: rgba(0,0,0,0.2); }
        h1 { background: linear-gradient(to right, #ffd700, #feb47b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        h2 { color: #ffd700; font-size: 1.5rem; margin-top: 0; }
        .nick-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #fff; }
        .nick-item { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #ffd700; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { transform: translateX(-5px); }
        footer { text-align: center; padding: 40px; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← Volver al Inicio</a>
    <header>
        <h1>Clan Names</h1>
        <p>Nombres legendarios para tu equipo o squad</p>
    </header>
    <div class="card">
        <h2>🛡️ Squads de Élite</h2>
        <div class="nick-list">
            <div class="nick-item">Shadow_Legion</div>
            <div class="nick-item">Titan_Warriors</div>
            <div class="nick-item">Void_Squad</div>
            <div class="nick-item">Cyber_Knights</div>
            <div class="nick-item">Eternal_Victory</div>
            <div class="nick-item">Rage_Clan</div>
        </div>
    </div>
    <footer>&copy; 2026 EliteNicks</footer>
</div>
</body>
</html>
